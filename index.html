    <h1><mark>So</mark>lod: Go can be a better C</h1>
    <p>
        Solod (<b>So</b>) is a strict subset of Go that transpiles to regular C.
        Write programs in Go — with its type safety, tooling, and clean syntax —
        and get plain C11 code you can read, debug, and ship without a runtime.
